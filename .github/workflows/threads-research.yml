name: Threads Research Drafts (Backup)

# ⚠️ 운영은 내 Mac launchd가 매일 KST 06:00 실행.
# 이 워크플로우는 Mac이 꺼져 있을 때 대비한 수동 백업용.
# Azure 데이터센터 IP 때문에 봇 감지 위험이 있어 자주 쓰지 말 것.
on:
  workflow_dispatch:
    inputs:
      keywords:
        description: "검색 키워드 (쉼표구분, 비우면 기본값)"
        required: false
        default: ""

concurrency:
  group: threads-research
  cancel-in-progress: false

jobs:
  research:
    name: Scrape + Draft
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 환경 검증
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          THREADS_SESSION_COOKIES: ${{ secrets.THREADS_SESSION_COOKIES }}
        run: |
          [ -n "${PRODUCTION_URL}" ] || { echo "::error::PRODUCTION_URL 미설정"; exit 1; }
          [ -n "${CRON_SECRET}" ] || { echo "::error::CRON_SECRET 미설정"; exit 1; }
          [ -n "${THREADS_SESSION_COOKIES}" ] || { echo "::warning::THREADS_SESSION_COOKIES 미설정 — 스크레이핑 skip됨"; }
          echo "✓ 환경 확인"

      - name: Playwright 설치
        run: |
          npm install --no-save playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: 리서치 실행
        env:
          THREADS_SESSION_COOKIES: ${{ secrets.THREADS_SESSION_COOKIES }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INGEST_URL: ${{ secrets.PRODUCTION_URL }}/api/threads/research/ingest
          RESEARCH_KEYWORDS: ${{ github.event.inputs.keywords }}
          OUR_USERNAME: safe_ntel
        run: node scripts/threads-research.mjs

      - name: 요약
        if: always()
        run: |
          {
            echo "## 🔎 Threads Research"
            echo ""
            echo "**실행:** $(date -u '+%Y-%m-%d %H:%M:%S UTC') · 트리거 \`${{ github.event_name }}\`"
            echo ""
            echo "👉 검토: https://prephone-tstry-back.vercel.app/threads"
          } >> "$GITHUB_STEP_SUMMARY"
