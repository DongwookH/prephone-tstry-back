name: Threads Publish (scheduled drafts)

# 발행 워커 — 미발행 scheduled 글 중 예약 시각(KST 9·14·20시 ±15분)이 지난 것을 1건씩 발행.
#
# ⚠️ GitHub Actions cron은 best-effort라 예약 시각보다 3~5시간 늦게,
#    하루 여러 슬롯을 1~2회로 뭉쳐서 실행됨 (2026-06 관측: 예약 9회/일 → 실제 2~3회 실행).
#    정시 슬롯 3개(0,5,11)만 잡으면 coalescing으로 마지막 글이 다음 날로 밀림.
#    → 대응: 20분 간격으로 촘촘히 잡아 캐치업 기회를 늘림(스킵 내성).
#      라우트가 12h freshness 윈도우 + MAX_PER_RUN=1로 처리하므로 burst 없이 순차 발행됨.
#    ※ 근본 해결은 외부 스케줄러(cron-job.org / Vercel Pro Cron). 이건 GHA 한정 임시 개선.
#
# 밴드: UTC 23,0-16시 (= KST 8시 ~ 익일 1시) — 슬롯(KST 9/14/20) + 최대 5h 지연 꼬리 커버.
# 분: :08/:28/:48 — 정시(:00) 피크 시간대를 피해 스킵 확률을 낮춤(GitHub 권장).
on:
  schedule:
    - cron: "8,28,48 23,0-16 * * *"
  workflow_dispatch:

concurrency:
  group: threads-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish due Threads drafts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 발행 워커 호출
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          [ -n "${PRODUCTION_URL}" ] || { echo "::error::PRODUCTION_URL 미설정"; exit 1; }
          [ -n "${CRON_SECRET}" ] || { echo "::error::CRON_SECRET 미설정"; exit 1; }

          response=$(curl -sS \
            -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST "${PRODUCTION_URL}/api/cron/threads-publish" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 90)
          http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2 | tr -d ' ')
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')

          if [ "$http_status" != "200" ]; then
            echo "::error::발행 워커 호출 실패 (HTTP $http_status)"
            echo "$body" | head -10
            exit 1
          fi

          published=$(echo "$body" | jq -r '.published // 0')
          failed=$(echo "$body" | jq -r '.failed // 0')
          remaining=$(echo "$body" | jq -r '.remaining // 0')

          {
            echo "## 📤 Threads Publish"
            echo ""
            echo "**발행:** $published · **실패:** $failed · **남음:** $remaining"
            echo ""
            echo "$body" | jq -r '.results[]? | "- " + (if .ok then "✅" else "❌" end) + " " + .keyword + " — " + (.mainId // .error // "?")'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✓ published=$published failed=$failed remaining=$remaining"
