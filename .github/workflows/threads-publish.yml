name: Threads Publish (scheduled drafts)

# 발행 워커 — 발행 슬롯 시각(KST 9·14·20시) 직후에만 호출.
# 동작: 승인된(status=scheduled) 글 중 예약시각 지난 것 조회 → 있으면 1건 발행.
#
# 슬롯은 ±15분 jitter(8:45~9:15 등)라 슬롯 "직후"인 :20부터 잡아야 다 커버됨.
# GitHub Actions cron은 부하로 스킵이 잦으므로, 각 슬롯당 :20/:35/:50 3번 시도(스킵 내성).
# 한 번이라도 돌면 그 슬롯 발행 + 12h freshness 윈도우로 못 잡은 건 다음 슬롯 cron이 따라잡음.
#
# UTC 0시=KST 9시 / UTC 5시=KST 14시 / UTC 11시=KST 20시.
#   → KST 9:20·9:35·9:50 / 14:20·14:35·14:50 / 20:20·20:35·20:50
on:
  schedule:
    - cron: "20,35,50 0,5,11 * * *"
  workflow_dispatch:

concurrency:
  group: threads-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish due Threads drafts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 발행 워커 호출
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          [ -n "${PRODUCTION_URL}" ] || { echo "::error::PRODUCTION_URL 미설정"; exit 1; }
          [ -n "${CRON_SECRET}" ] || { echo "::error::CRON_SECRET 미설정"; exit 1; }

          response=$(curl -sS \
            -w "\nHTTP_STATUS:%{http_code}\n" \
            -X POST "${PRODUCTION_URL}/api/cron/threads-publish" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 90)
          http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2 | tr -d ' ')
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')

          if [ "$http_status" != "200" ]; then
            echo "::error::발행 워커 호출 실패 (HTTP $http_status)"
            echo "$body" | head -10
            exit 1
          fi

          published=$(echo "$body" | jq -r '.published // 0')
          failed=$(echo "$body" | jq -r '.failed // 0')
          remaining=$(echo "$body" | jq -r '.remaining // 0')

          {
            echo "## 📤 Threads Publish"
            echo ""
            echo "**발행:** $published · **실패:** $failed · **남음:** $remaining"
            echo ""
            echo "$body" | jq -r '.results[]? | "- " + (if .ok then "✅" else "❌" end) + " " + .keyword + " — " + (.mainId // .error // "?")'
          } >> "$GITHUB_STEP_SUMMARY"

          echo "✓ published=$published failed=$failed remaining=$remaining"
