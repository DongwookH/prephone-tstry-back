name: Threads Weekly Plan (21 drafts)

# л§ӨмЈј мӣ”мҡ”мқј KST 06:00 = UTC мқјмҡ”мқј 21:00.
# GHA cronмқҖ best-effort ~1~2h м§Җм—°мқҙлҜҖлЎң мқјмҡ”мқј 19:15 UTCм—җ нҠёлҰ¬кұ° вҶ’
# мӢӨм ң ~21:00 UTC ~= KST мӣ”мҡ”мқј 06:00.
#
# 21лІҲ м§Ғл ¬ нҳём¶ң (к°Ғ 1нҺё мғқм„ұ, Vercel 60мҙҲ н•ңлҸ„ нҡҢн”ј).
on:
  schedule:
    - cron: "15 19 * * 0"
  workflow_dispatch:
    inputs:
      reason:
        description: "мҲҳлҸҷ мӢӨн–ү мӮ¬мң  (м„ нғқ)"
        required: false
        default: "manual"

concurrency:
  group: threads-weekly-plan
  cancel-in-progress: false

jobs:
  generate:
    name: Generate 21 weekly drafts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: нҷҳкІҪ кІҖмҰқ
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          [ -n "${PRODUCTION_URL}" ] || { echo "::error::PRODUCTION_URL лҜём„Өм •"; exit 1; }
          [ -n "${CRON_SECRET}" ] || { echo "::error::CRON_SECRET лҜём„Өм •"; exit 1; }
          echo "вң“ Secrets OK"

      - name: 21нҺё м§Ғл ¬ мғқм„ұ
        env:
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          total=0
          fail=0
          for i in $(seq 0 20); do
            echo "в–¶ [$i/20] мғқм„ұ мҡ”мІӯ"
            response=$(curl -sS \
              -w "\nHTTP_STATUS:%{http_code}\n" \
              -X POST "${PRODUCTION_URL}/api/cron/threads-weekly-plan" \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              -d "{\"index\": $i}" \
              --max-time 90 \
              --retry 1)
            http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2 | tr -d ' ')
            body=$(echo "$response" | sed '/HTTP_STATUS:/d')
            if [ "$http_status" = "200" ]; then
              total=$((total + 1))
              kw=$(echo "$body" | jq -r '.keyword // "?"')
              sched=$(echo "$body" | jq -r '.scheduled_at // "?"')
              echo "вң“ $i: $kw вҶ’ $sched"
            else
              fail=$((fail + 1))
              echo "::warning::index $i мӢӨнҢЁ (HTTP $http_status)"
              echo "$body" | head -5
            fi
            sleep 2
          done

          {
            echo "## рҹ§ө Threads Weekly Plan"
            echo ""
            echo "**м„ұкіө:** $total / 21"
            echo "**мӢӨнҢЁ:** $fail"
            echo ""
            echo "рҹ‘ү кІҖнҶ : ${PRODUCTION_URL}/threads"
          } >> "$GITHUB_STEP_SUMMARY"
